<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - Cafetín Smart</title>
    <!-- Bootstrap 5.3 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    
    <style>
        :root {
            --color-primary: #8C5535;
            --color-primary-dark: #6A3E24;
            --color-accent: #E5A93C;
        }
        
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            background-image: radial-gradient(circle at top right, rgba(140, 85, 53, 0.2), transparent 40%),
                              radial-gradient(circle at bottom left, rgba(229, 169, 60, 0.15), transparent 40%);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
        }

        .login-card {
            background: rgba(30, 30, 30, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 2.5rem 2rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .logo-icon {
            font-size: 3rem;
            color: var(--color-accent);
            text-align: center;
            margin-bottom: 0.5rem;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }

        .login-title {
            text-align: center;
            font-weight: 700;
            font-size: 1.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -0.5px;
        }

        .login-subtitle {
            text-align: center;
            color: #a0a0a0;
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-control-custom {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 10px;
            padding: 0.75rem 1rem;
            transition: all 0.3s ease;
        }

        .form-control-custom:focus {
            background: rgba(0, 0, 0, 0.4);
            border-color: var(--color-primary);
            box-shadow: 0 0 0 4px rgba(140, 85, 53, 0.15);
            color: #fff;
        }

        .form-control-custom::placeholder {
            color: #6c757d;
        }

        .btn-login {
            background: var(--color-primary);
            color: white;
            border: none;
            border-radius: 10px;
            padding: 0.8rem;
            font-weight: 600;
            width: 100%;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-login:hover {
            background: var(--color-primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(140, 85, 53, 0.3);
        }

        .back-link {
            display: block;
            text-align: center;
            color: #a0a0a0;
            text-decoration: none;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            transition: color 0.3s ease;
        }

        .back-link:hover {
            color: white;
        }

        .alert-custom {
            background: rgba(220, 53, 69, 0.1);
            border: 1px solid rgba(220, 53, 69, 0.2);
            color: #ff6b6b;
            border-radius: 10px;
            padding: 0.75rem;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
    </style>
</head>
<body>

    <div class="login-container fade-in">
        <div class="login-card">
            <div class="logo-icon">☕</div>
            <h1 class="login-title">Bienvenido de vuelta</h1>
            <p class="login-subtitle">Ingresa tus credenciales para continuar</p>

            <!-- Mensaje de error de Spring Security -->
            <div th:if="${param.error}" class="alert alert-custom mb-3" role="alert">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span>Usuario o contraseña incorrectos.</span>
            </div>

            <!-- Mensaje de logout de Spring Security -->
            <div th:if="${param.logout}" class="alert alert-success bg-transparent border-success text-success mb-3" style="border-radius: 10px;" role="alert">
                <i class="bi bi-check-circle-fill"></i>
                <span>Has cerrado sesión exitosamente.</span>
            </div>

            <form th:action="@{/login}" method="post">
                <!-- Username -->
                <div class="mb-3">
                    <label for="username" class="form-label visually-hidden">Correo electrónico</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-0 text-muted" style="position: absolute; z-index: 10; margin-top: 0.75rem; margin-left: 0.5rem;">
                            <i class="bi bi-envelope"></i>
                        </span>
                        <input type="email" id="username" name="username" class="form-control form-control-custom" style="padding-left: 2.5rem;" placeholder="correo@ejemplo.com" required autofocus>
                    </div>
                </div>

                <!-- Password -->
                <div class="mb-3">
                    <label for="password" class="form-label visually-hidden">Contraseña</label>
                    <div class="input-group">
                        <span class="input-group-text bg-transparent border-0 text-muted" style="position: absolute; z-index: 10; margin-top: 0.75rem; margin-left: 0.5rem;">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" id="password" name="password" class="form-control form-control-custom" style="padding-left: 2.5rem;" placeholder="Contraseña" required>
                    </div>
                </div>

                <!-- Botón -->
                <button type="submit" class="btn btn-login">
                    Iniciar Sesión
                </button>
            </form>

            <a th:href="@{/}" class="back-link">
                <i class="bi bi-arrow-left"></i> Volver al inicio
            </a>
            
            <div class="text-center mt-4 text-muted" style="font-size: 0.8rem;">
                <p class="mb-0">Cuentas de prueba:</p>
                <p class="mb-0">admin@cafetin.com / 12345</p>
                <p>n00345408@upn.pe / 12345</p>
            </div>
        </div>
    </div>

</body>
</html>

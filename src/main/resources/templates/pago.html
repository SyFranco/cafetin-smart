<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments :: head('Pago - Cafetín Smart')}"></head>
<body>
    <div th:replace="~{fragments :: accessibility}"></div>
    <header th:replace="~{fragments :: header}"></header>

    <div class="main-container">
        <main id="main-content" role="main">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <h1 class="h2 mb-4" style="color: var(--color-secondary);">
                        <i class="bi bi-credit-card" aria-hidden="true"></i>
                        Procesar Pago
                    </h1>

                    <div class="card shadow-sm border-0 mb-4">
                        <div class="card-body p-4">
                            <!-- Formulario de Pago -->
                            <form th:action="@{/pago/procesar}" method="post">
                                
                                <div class="mb-4">
                                    <h2 class="h5 mb-3">Datos del Estudiante</h2>
                                    <div class="mb-3">
                                        <label for="nombre" class="form-label">Nombre Completo</label>
                                        <input type="text" class="form-control" id="nombre" name="nombre" th:value="${nombreUsuario}" required placeholder="Ej: Juan Pérez">
                                    </div>
                                </div>

                                <div class="mb-4">
                                    <h2 class="h5 mb-3">Método de Pago</h2>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="radio" name="metodo" id="tarjeta" value="TARJETA" checked>
                                        <label class="form-check-label" for="tarjeta">
                                            <i class="bi bi-credit-card"></i> Tarjeta de Débito / Crédito
                                        </label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="radio" name="metodo" id="carnet" value="CARNET">
                                        <label class="form-check-label" for="carnet">
                                            <i class="bi bi-person-badge"></i> Saldo de Carnet Universitario
                                        </label>
                                    </div>
                                    <div class="form-check mb-2">
                                        <input class="form-check-input" type="radio" name="metodo" id="efectivo" value="EFECTIVO">
                                        <label class="form-check-label" for="efectivo">
                                            <i class="bi bi-cash"></i> Pago en Mostrador (Efectivo)
                                        </label>
                                    </div>
                                </div>

                                <!-- Resumen de Pago (Datos simulados de tarjeta si se elige tarjeta) -->
                                <div class="p-3 bg-light rounded mb-4">
                                    <p class="mb-1 text-muted">Total a Pagar:</p>
                                    <h3 class="h4" style="color: var(--color-primary);" th:text="'$' + ${#numbers.formatDecimal(total, 1, 2)}">$0.00</h3>
                                </div>

                                <div class="d-flex justify-content-between">
                                    <a th:href="@{/carrito}" class="btn btn-outline-secondary">
                                        <i class="bi bi-arrow-left"></i> Volver al carrito
                                    </a>
                                    <button type="submit" class="btn btn-primary-custom">
                                        <i class="bi bi-check-circle"></i> Confirmar y Pagar
                                    </button>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>
        <footer th:replace="~{fragments :: footer}"></footer>
    </div>
    <div th:replace="~{fragments :: scripts}"></div>
</body>
</html>
